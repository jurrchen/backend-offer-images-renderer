---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: offer-renderer
  namespace: offer-renderer
spec:
  interval: 1m
  chart:
    spec:
      chart: offer-renderer
      version: '>=0.0.1'
      sourceRef:
        kind: HelmRepository
        name: offer-renderer-helm-chart
        namespace: offer-renderer
      interval: 1m
  values:
    image:
      repository: registry.gitlab.com/popshopdev/platform/backend-offer-images-renderer/snapshot
      tag: '' # {"$imagepolicy": "offer-renderer:offer-renderer:tag"}
