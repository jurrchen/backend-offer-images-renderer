apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: offer-renderer
  namespace: offer-renderer
spec:
  values:
    image:
      repository: registry.gitlab.com/popshopdev/platform/backend-offer-images-renderer/release # {"$imagepolicy": "offer-renderer:offer-renderer:name"}
      tag: 'v0.11.0-0-gb51278b-prod' # {"$imagepolicy": "offer-renderer:offer-renderer:tag"}
    env:
      NODE_ENV: production
      LOG_LEVEL: info
      LOG_FORMAT: json
      SENTRY_ENVIRONMENT: production
      GCS_BUCKET_NAME: popshopprod-offer-renderer-assets
      GCP_PROJECT_ID: popshopprod
      PUBSUB_TOPIC_ID: renderer-jobs-completed
    migrations:
      enabled: true
    serviceAccount:
      create: true
      automount: true
      annotations:
        iam.gke.io/gcp-service-account: svc-app-offer-renderer@popshopprod.iam.gserviceaccount.com
    service:
      gateway: istio-internal-ingress/internal-communication
      domains:
        - offer-renderer.production.fw
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
