apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: internal-{{ include "offer-renderer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "offer-renderer.labels" . | nindent 4 }}
spec:
  gateways:
    - {{ .Values.service.gateway }}
  hosts: {{ toYaml .Values.service.domains | nindent 4 }}
  http:
    - route:
        - destination:
            host: {{ include "offer-renderer.fullname" . }}
            port:
              number: {{ .Values.service.port }}
