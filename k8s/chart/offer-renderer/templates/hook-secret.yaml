{{- if and .Values.migrations.enabled .Values.secrets.data }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}-hook
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    {{- include "offer-renderer.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
