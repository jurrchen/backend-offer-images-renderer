services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: renderer
      POSTGRES_PASSWORD: renderer_dev
      POSTGRES_DB: offer-renderer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renderer -d offer-renderer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  renderer:
    build:
      context: .
      dockerfile: apps/renderer-server/Dockerfile
      args:
        GITLAB_AUTH_TOKEN: ${GITLAB_AUTH_TOKEN}
    container_name: fourthwall-renderer
    ports:
      - "3000:3000"
    environment:
      - ENVIRONMENT=local
      - PORT=3000
      - CANVAS_SIZE=2048
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - WORKER_COUNT=${WORKER_COUNT:-1}
      - NODE_HEAP_LIMIT_MB=${NODE_HEAP_LIMIT_MB:-2048}
      - MAX_JOBS_PER_WORKER=${MAX_JOBS_PER_WORKER:-25}
      - MAX_RESPAWNS=${MAX_RESPAWNS:-5}
      - JOB_TIMEOUT=${JOB_TIMEOUT:-120000}
      - API_KEY=${API_KEY:-dev-api-key}
      - DATABASE_URL=postgresql://renderer:renderer_dev@postgres:5432/offer-renderer
      - LOCAL_OUTPUT_DIR=./output
    volumes:
      - renderer-assets:/app/apps/renderer-server/assets/cdn
      - renderer-output:/app/apps/renderer-server/output
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/api/v1/health/live', (res) => process.exit(res.statusCode === 200 ? 0 : 1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

volumes:
  postgres_data:
  renderer-assets:
  renderer-output:
